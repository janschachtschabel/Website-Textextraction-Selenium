# nginx Reverse-Proxy Konfiguration für Volltextextraktion API
#
# Einsatz:
#   1. Diese Datei nach /etc/nginx/sites-available/volltextextraktion kopieren
#   2. Symlink anlegen: ln -s /etc/nginx/sites-available/volltextextraktion /etc/nginx/sites-enabled/
#   3. Konfiguration prüfen: nginx -t
#   4. Nginx neu laden: systemctl reload nginx
#
# Voraussetzung: API läuft auf localhost:8000 (python run.py oder hatch run serve)
# Für HTTPS: Certbot-Kommentare unten einkommentieren (certbot --nginx -d your-domain.com)

upstream volltextextraktion {
    # Uvicorn lauscht mit mehreren Worker-Prozessen auf einem Socket.
    # Alle Worker teilen denselben Port — ein upstream-Eintrag genügt.
    server 127.0.0.1:8000;

    # Keepalive-Verbindungen zum Backend wiederverwenden (reduziert TCP-Overhead)
    keepalive 32;
}

server {
    listen 80;
    # listen [::]:80;           # IPv6 aktivieren falls benötigt

    server_name _;              # Catch-all; durch eigene Domain ersetzen, z.B.: example.com

    # ── Größenlimits ──────────────────────────────────────────────────────────
    client_max_body_size 2M;    # Batch-Request mit 50 URLs + Optionen bleibt weit darunter

    # ── Timeouts ─────────────────────────────────────────────────────────────
    # JS-Modus kann bis zu 180s dauern — Timeouts entsprechend großzügig setzen
    proxy_connect_timeout   10s;
    proxy_send_timeout      200s;
    proxy_read_timeout      200s;
    send_timeout            200s;

    # ── Proxy-Header ─────────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # HTTP/1.1 für Keepalive zum Backend erforderlich
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ── Haupt-Location ────────────────────────────────────────────────────────
    location / {
        proxy_pass http://volltextextraktion;
    }

    # ── Health-Check ohne Auth (für Load-Balancer / Monitoring) ──────────────
    location /health {
        proxy_pass http://volltextextraktion;
        access_log off;
    }

    # ── Rate-Limiting auf nginx-Ebene ──────────────────────────────────────────
    # Empfohlen bei UVICORN_WORKERS > 1, da Python-seitige Rate-Limiter pro Worker
    # arbeiten und daher das N-fache der konfigurierten Rate durchlassen würden.
    # limit_req_zone wird im http{}-Block definiert; hier nur location-Direktiven:
    #
    # Im umgebenden http{}-Block (z.B. /etc/nginx/nginx.conf) hinzufügen:
    #   limit_req_zone $binary_remote_addr zone=crawl_per_ip:10m rate=5r/s;
    #   limit_req_zone $server_addr         zone=crawl_global:1m  rate=20r/s;
    #
    location /crawl {
        # Pro-IP: max 5 req/s, Burst 10 (konfigurieren nach Bedarf)
        # limit_req zone=crawl_per_ip burst=10 nodelay;
        # Globales Systemlimit: max 20 req/s gesamt
        # limit_req zone=crawl_global burst=20 nodelay;
        proxy_pass http://volltextextraktion;
    }

    # ── HTTPS (Certbot ergänzt diesen Block automatisch) ─────────────────────
    # Manuell: Zeilen unten einkommentieren und Pfade anpassen
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # return 301 https://$host$request_uri;  # HTTP → HTTPS redirect (im HTTP-Block)
}
